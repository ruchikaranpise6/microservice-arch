server:
  port: 8081

spring:
  application:
    name: haarlememeer-service

  datasource:
    url: jdbc:postgresql://localhost:5432/haarlememeer_db
    username: admin
    password: admin123

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

logging:
  level:
    root: INFO
    com.microservices.study: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  file:
    name: logs/haarlememeer-service.log

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
