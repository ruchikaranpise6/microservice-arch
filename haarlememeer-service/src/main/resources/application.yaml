server:
  port: 8081

spring:
  application:
    name: haarlememeer-service

  datasource:
    url: jdbc:postgresql://localhost:5432/haarlememeer_db
    username: admin
    password: admin123

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

logging:
  level:
    root: INFO
    com.microservices.study: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
  file:
    name: logs/haarlememeer-service.log

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
